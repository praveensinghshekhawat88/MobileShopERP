spring:
  jpa:
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: WARN
    com.mobileshoperp: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
