spring:
  datasource:
    url: jdbc:h2:mem:mobile_shop_erp_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

jwt:
  secret: test-secret-key-for-unit-tests-minimum-256-bits-required-here

logging:
  level:
    root: WARN
    com.mobileshoperp: INFO
