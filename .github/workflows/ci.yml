name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Grant Gradle wrapper permission
        working-directory: backend
        run: chmod +x gradlew

      - name: Build and test
        working-directory: backend
        run: ./gradlew build --no-daemon

  {
    name: admin-test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Unit tests
        working-directory: admin
        run: npm run test

      - name: Install Playwright Chromium
        working-directory: admin
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        working-directory: admin
        run: npm run test:e2e

  docker-image:
    runs-on: ubuntu-latest
    needs: [build, admin-test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: backend
        run: docker build -t mobile-shop-erp-backend:ci .

      - name: Build admin Docker image
        working-directory: admin
        run: docker build -t mobile-shop-erp-admin:ci .
